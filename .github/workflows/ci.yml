name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Derive appropriate SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      # --- Frontend Checks ---
      - name: Frontend Linter (Vue/Vite)
        run: npx nx affected --target=lint --projects=frontend

      # --- Backend Checks (Symfony + Docker) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Services (Docker Compose)
        run: docker compose up -d backend db
        env:
          APP_ENV: test

      - name: Install PHP Dependencies
        run: docker compose exec -T backend composer install --no-interaction --prefer-dist

      - name: Run Symfony Tests (PHPUnit)
        run: docker compose exec -T backend bin/phpunit

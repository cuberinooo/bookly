name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Derive appropriate SHAs for nx affected
        uses: nrwl/nx-set-shas@v5

      # --- Frontend Checks ---
      - name: Frontend Linter (Vue/Vite)
        run: npx nx run frontend:lint

      # --- Backend Checks (Symfony + Docker) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Start Services (Docker Compose)
        run: docker compose up -d backend db
        env:
          APP_ENV: test

      - name: Wait for Composer to finish
        run: |
          # This loop waits until the vendor folder and the autoload file exist
          timeout 300s bash -c 'until [ -f apps/backend/vendor/autoload.php ]; do sleep 5; done'

      - name: Generate Keys
        run: |
          # Generate JWT keys for authentication tests
          docker compose exec -T backend mkdir -p config/jwt
          docker compose exec -T backend bin/console lexik:jwt:generate-keypair --env=test --overwrite --no-interaction

      - name: Prepare Test Database
        run: |
          docker compose exec -T backend bin/console doctrine:database:create --if-not-exists --env=test
          docker compose exec -T backend bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run Symfony Tests (PHPUnit)
        run: docker compose exec -T backend bin/phpunit
